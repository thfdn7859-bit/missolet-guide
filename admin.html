<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MISSOLET GUIDE — Admin</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SLELGVBL1L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SLELGVBL1L');
  </script>

  <!-- Pretendard -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060F0A;
      --card: #0D1A12;
      --border: #1A3024;
      --gold: #2D7A52;
      --gold-dim: rgba(45,122,82,0.15);
      --text: #E8E8E8;
      --muted: #7A9E8A;
      --red: #E05C5C;
      --radius: 16px;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .login-input {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    .login-input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      background: var(--gold);
      color: #0A0A0A;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.88; }

    .login-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    /* Header */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
      flex: 1;
    }

    .header-logo span { color: var(--muted); font-weight: 400; }

    .btn-header {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-header:hover { border-color: var(--gold); color: var(--gold); }

    .btn-header.gold {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-header.gold:hover { opacity: 0.8; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      display: none;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Main content */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* Section title */
    .section-title {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 16px;
      margin-top: 40px;
    }

    .section-title:first-of-type { margin-top: 0; }

    /* Metric cards */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 640px) {
      .metrics-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
    }

    .metric-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .metric-value.small { font-size: 24px; }

    /* 2-column row */
    .two-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .two-col { grid-template-columns: 1fr 1fr; }
    }

    /* Generic card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Chart containers */
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap-full { position: relative; height: 200px; }

    /* Region list */
    .region-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }

    .region-item { display: flex; flex-direction: column; gap: 5px; }

    .region-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .region-name { color: var(--text); }
    .region-count { color: var(--muted); font-size: 12px; }

    .region-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .region-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    td {
      padding: 12px 12px;
      border-bottom: 1px solid rgba(42,42,42,0.6);
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(200,169,126,0.04); }

    .td-date { color: var(--muted); font-size: 12px; }
    .td-positive { color: #6DBE8C; }
    .td-negative { color: var(--red); }

    /* Empty state */
    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 0; }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .header { padding: 0 16px; }
      .main { padding: 24px 16px 48px; }
      .metric-value { font-size: 26px; }
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Missolet Guide</div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">운영자 전용 페이지입니다</div>
    <input
      id="pw-input"
      type="password"
      class="login-input"
      placeholder="비밀번호 입력"
      autocomplete="current-password"
    />
    <button class="login-btn" onclick="tryLogin()">입장</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <header class="header">
    <div class="header-logo">MISSOLET GUIDE <span>/ ADMIN</span></div>
    <button class="btn-header gold" onclick="loadData()">
      ↻ 새로고침
    </button>
    <button class="btn-header" onclick="logout()">
      나가기
    </button>
  </header>

  <main class="main">
    <!-- Metrics -->
    <div class="section-title">핵심 지표</div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">총 활성 유저</div>
        <div class="metric-value" id="m-users">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">총 저장 횟수</div>
        <div class="metric-value" id="m-total">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">오늘 저장</div>
        <div class="metric-value" id="m-today">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">평균 순이익률</div>
        <div class="metric-value small" id="m-avg-profit">—</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="section-title">업종 / 지역</div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">업종별 사용 현황</div>
        <div class="chart-wrap">
          <canvas id="chart-industry"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">지역별 현황</div>
        <ul class="region-list" id="region-list">
          <li class="empty">데이터 없음</li>
        </ul>
      </div>
    </div>

    <!-- Trend chart -->
    <div class="section-title">일별 저장 추세 (최근 30일)</div>
    <div class="card">
      <div class="chart-wrap-full">
        <canvas id="chart-trend"></canvas>
      </div>
    </div>

    <!-- Recent records -->
    <div class="section-title">최근 저장 기록</div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>업종</th>
              <th>지역</th>
              <th>매출액</th>
              <th>순이익률</th>
            </tr>
          </thead>
          <tbody id="records-tbody">
            <tr><td colspan="5" class="empty">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
  // ── CONSTANTS ──
  const ADMIN_PW = 'missolet2026!';
  const SUPABASE_URL = 'https://knmjxctrrfhvyixtlrac.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_g-wGJa_SLyMTC480nnxO5A_hDKloW0Z';

  let sb = null;
  let industryChart = null;
  let trendChart = null;

  // ── AUTH ──
  function tryLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PW) {
      sessionStorage.setItem('admin_auth', '1');
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = '비밀번호가 틀렸습니다';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initSupabase();
    loadData();
  }

  // Check session on load
  if (sessionStorage.getItem('admin_auth') === '1') {
    showDashboard();
  }

  // ── SUPABASE ──
  function initSupabase() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  function setLoading(on) {
    document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
  }

  async function loadData() {
    if (!sb) return;
    setLoading(true);
    try {
      await Promise.all([
        loadMetrics(),
        loadIndustry(),
        loadRegion(),
        loadTrend(),
        loadRecords(),
      ]);
    } catch (err) {
      console.error('loadData error:', err);
    } finally {
      setLoading(false);
    }
  }

  // ① Metrics
  async function loadMetrics() {
    // Total count
    const { count: total } = await sb
      .from('calculations')
      .select('*', { count: 'exact', head: true });

    // Unique users
    const { data: uData } = await sb
      .from('calculations')
      .select('user_id');
    const uniqueUsers = uData ? new Set(uData.map(r => r.user_id).filter(Boolean)).size : 0;

    // Today
    const todayStart = new Date();
    todayStart.setHours(0, 0, 0, 0);
    const { count: todayCount } = await sb
      .from('calculations')
      .select('*', { count: 'exact', head: true })
      .gte('created_at', todayStart.toISOString());

    // Avg profit
    const { data: profitData } = await sb
      .from('calculations')
      .select('순이익률');
    let avgProfit = null;
    if (profitData && profitData.length) {
      const valid = profitData.map(r => parseFloat(r['순이익률'])).filter(v => !isNaN(v));
      if (valid.length) avgProfit = valid.reduce((a, b) => a + b, 0) / valid.length;
    }

    document.getElementById('m-users').textContent = uniqueUsers.toLocaleString();
    document.getElementById('m-total').textContent = (total ?? 0).toLocaleString();
    document.getElementById('m-today').textContent = (todayCount ?? 0).toLocaleString();
    document.getElementById('m-avg-profit').textContent =
      avgProfit !== null ? avgProfit.toFixed(1) + '%' : '—';
  }

  // ② Industry bar chart
  async function loadIndustry() {
    const { data } = await sb
      .from('calculations')
      .select('업종');

    // Group by 업종 client-side
    const counts = {};
    (data || []).forEach(r => {
      const k = r['업종'] || '미분류';
      counts[k] = (counts[k] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 12);
    const labels = sorted.map(([k]) => k);
    const values = sorted.map(([, v]) => v);

    const ctx = document.getElementById('chart-industry').getContext('2d');
    if (industryChart) industryChart.destroy();
    industryChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '저장 횟수',
          data: values,
          backgroundColor: 'rgba(200,169,126,0.75)',
          borderColor: '#3CAF73',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => ` ${ctx.parsed.x}회` }
          }
        },
        scales: {
          x: {
            ticks: { color: '#888', font: { size: 11 } },
            grid: { color: 'rgba(42,42,42,0.8)' },
          },
          y: {
            ticks: { color: '#E8E8E8', font: { size: 12 } },
            grid: { display: false },
          }
        }
      }
    });
  }

  // ③ Region list
  async function loadRegion() {
    const { data } = await sb
      .from('calculations')
      .select('지역');

    const counts = {};
    (data || []).forEach(r => {
      const k = r['지역'] || '미분류';
      counts[k] = (counts[k] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 12);
    const max = sorted.length ? sorted[0][1] : 1;

    const ul = document.getElementById('region-list');
    if (!sorted.length) {
      ul.innerHTML = '<li class="empty">데이터 없음</li>';
      return;
    }

    ul.innerHTML = sorted.map(([name, cnt]) => `
      <li class="region-item">
        <div class="region-row">
          <span class="region-name">${name}</span>
          <span class="region-count">${cnt}회</span>
        </div>
        <div class="region-bar-bg">
          <div class="region-bar-fill" style="width:${Math.round(cnt/max*100)}%"></div>
        </div>
      </li>
    `).join('');
  }

  // ④ Trend line chart (last 30 days)
  async function loadTrend() {
    const since = new Date();
    since.setDate(since.getDate() - 30);
    since.setHours(0, 0, 0, 0);

    const { data } = await sb
      .from('calculations')
      .select('created_at')
      .gte('created_at', since.toISOString());

    // Group by date
    const counts = {};
    (data || []).forEach(r => {
      const d = r.created_at ? r.created_at.slice(0, 10) : null;
      if (d) counts[d] = (counts[d] || 0) + 1;
    });

    // Build last-30-days label array
    const labels = [];
    const values = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const label = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      labels.push(label);
      values.push(counts[key] || 0);
    }

    const ctx = document.getElementById('chart-trend').getContext('2d');
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '저장 횟수',
          data: values,
          borderColor: '#3CAF73',
          backgroundColor: 'rgba(200,169,126,0.12)',
          pointBackgroundColor: '#3CAF73',
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => ` ${ctx.parsed.y}회` }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#888',
              font: { size: 10 },
              maxTicksLimit: 10,
              maxRotation: 0,
            },
            grid: { color: 'rgba(42,42,42,0.8)' },
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#888', font: { size: 11 }, stepSize: 1 },
            grid: { color: 'rgba(42,42,42,0.8)' },
          }
        }
      }
    });
  }

  // ⑤ Recent records table
  async function loadRecords() {
    const { data } = await sb
      .from('calculations')
      .select('created_at, 업종, 지역, 매출액, 순이익률')
      .order('created_at', { ascending: false })
      .limit(20);

    const tbody = document.getElementById('records-tbody');
    if (!data || !data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">데이터 없음</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(r => {
      // Date format MM/DD HH:mm
      let dateStr = '—';
      if (r.created_at) {
        const d = new Date(r.created_at);
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        const hh = String(d.getHours()).padStart(2,'0');
        const min = String(d.getMinutes()).padStart(2,'0');
        dateStr = `${mm}/${dd} ${hh}:${min}`;
      }

      // Revenue format
      const rev = r['매출액'];
      const revStr = rev != null
        ? Number(rev).toLocaleString() + '원'
        : '—';

      // Profit rate
      const profit = r['순이익률'];
      const profitNum = parseFloat(profit);
      let profitStr = '—';
      let profitClass = '';
      if (!isNaN(profitNum)) {
        profitStr = profitNum.toFixed(1) + '%';
        profitClass = profitNum < 0 ? 'td-negative' : profitNum > 0 ? 'td-positive' : '';
      }

      return `
        <tr>
          <td class="td-date">${dateStr}</td>
          <td>${r['업종'] || '—'}</td>
          <td>${r['지역'] || '—'}</td>
          <td>${revStr}</td>
          <td class="${profitClass}">${profitStr}</td>
        </tr>
      `;
    }).join('');
  }
</script>
</body>
</html>
