<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — MISSOLET GUIDE</title>

  <!-- Pretendard -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SLELGVBL1L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-SLELGVBL1L');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A080F;
      --card:     #130D1E;
      --border:   #2A1D3E;
      --accent:   #7C3AED;
      --accent2:  #9B59B6;
      --text:     #F0EBF8;
      --muted:    #8B7FA8;
      --input-bg: #1A1128;
      --kakao:    #FEE500;
      --kakao-text: #191919;
      --radius-card: 16px;
      --radius-btn:  12px;
      --h-btn:    52px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 16px;
    }

    /* ── 로고 ── */
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #C084FC 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── 카드 ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 32px 28px 36px;
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 0 0 14px;
      cursor: pointer;
      transition: color .2s;
      position: relative;
    }
    .tab-btn.active {
      color: var(--text);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── 폼 패널 ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── 입력 그룹 ── */
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 48px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--muted); opacity: .6; }

    /* ── 버튼 ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: var(--h-btn);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, opacity .2s;
      letter-spacing: .02em;
    }
    .btn-primary:hover { background: #6D28D9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── 구분선 ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── 카카오 버튼 ── */
    .btn-kakao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: var(--h-btn);
      background: var(--kakao);
      color: var(--kakao-text);
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      letter-spacing: .01em;
    }
    .btn-kakao:hover { opacity: .88; }
    .btn-kakao svg { flex-shrink: 0; }

    /* ── 비밀번호 찾기 ── */
    .forgot-wrap {
      text-align: right;
      margin-top: 10px;
    }
    .forgot-link {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .2s;
    }
    .forgot-link:hover { color: var(--accent2); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1E1433;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      padding: 13px 22px;
      border-radius: 40px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.error { border-color: rgba(239,68,68,0.6); background: #1C0A1A; color: #FCA5A5; }
    #toast.success { border-color: rgba(124,58,237,0.8); background: #1E1433; color: #E9D5FF; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .card { padding: 28px 20px 32px; }
      .logo { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="logo">MISSOLET GUIDE</div>

  <div class="card">
    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">로그인</button>
      <button class="tab-btn" data-tab="signup">회원가입</button>
    </div>

    <!-- 로그인 패널 -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label for="login-email">이메일</label>
        <input id="login-email" type="email" placeholder="이메일을 입력하세요" autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-pw">비밀번호</label>
        <input id="login-pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
      </div>

      <div class="forgot-wrap">
        <button class="forgot-link" id="btn-forgot">비밀번호를 잊으셨나요?</button>
      </div>

      <button class="btn-primary" id="btn-login">로그인</button>

      <div class="divider">또는</div>

      <button class="btn-kakao" id="btn-kakao-login">
        <!-- 카카오 아이콘 -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.64 1.73 4.97 4.35 6.3l-.9 3.32c-.08.3.26.54.52.37L11.1 18.1A10.6 10.6 0 0 0 12 18.17c4.97 0 9-3.36 9-7.5S16.97 3 12 3Z" fill="currentColor"/>
        </svg>
        카카오로 시작하기
      </button>
    </div>

    <!-- 회원가입 패널 -->
    <div class="panel" id="panel-signup">
      <div class="field">
        <label for="signup-email">이메일</label>
        <input id="signup-email" type="email" placeholder="이메일을 입력하세요" autocomplete="email" />
      </div>
      <div class="field">
        <label for="signup-pw">비밀번호 <span style="font-weight:400;color:#6D5A8A">(8자 이상)</span></label>
        <input id="signup-pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="signup-pw2">비밀번호 확인</label>
        <input id="signup-pw2" type="password" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="signup-store">가게명 <span style="font-weight:400;color:#6D5A8A">(선택)</span></label>
        <input id="signup-store" type="text" placeholder="가게명을 입력하세요" />
      </div>

      <button class="btn-primary" id="btn-signup">가입하기</button>

      <div class="divider">또는</div>

      <button class="btn-kakao" id="btn-kakao-signup">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.64 1.73 4.97 4.35 6.3l-.9 3.32c-.08.3.26.54.52.37L11.1 18.1A10.6 10.6 0 0 0 12 18.17c4.97 0 9-3.36 9-7.5S16.97 3 12 3Z" fill="currentColor"/>
        </svg>
        카카오로 시작하기
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    /* ── Supabase 초기화 ── */
    const SUPABASE_URL     = 'https://knmjxctrrfhvyixtlrac.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_g-wGJa_SLyMTC480nnxO5A_hDKloW0Z'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    /* ── GA4 helper ── */
    const GA_ID = 'G-SLELGVBL1L'
    function trackEvent(name, params = {}) {
      if (typeof gtag === 'function') gtag('event', name, params)
    }

    /* ── 이미 로그인 상태 확인 ── */
    ;(async () => {
      const { data: { session } } = await supabase.auth.getSession()
      if (session) window.location.href = 'mypage.html'
    })()

    /* ── Toast ── */
    let toastTimer = null
    const toastEl = document.getElementById('toast')
    function showToast(msg, type = '') {
      clearTimeout(toastTimer)
      toastEl.textContent = msg
      toastEl.className = type ? `show ${type}` : 'show'
      toastTimer = setTimeout(() => { toastEl.className = '' }, 3200)
    }

    /* ── 에러 메시지 한국어 변환 ── */
    function toKoreanError(err) {
      if (!err) return '잠시 후 다시 시도해주세요'
      const msg = (err.message || '').toLowerCase()
      if (msg.includes('invalid login credentials')) return '이메일 또는 비밀번호가 틀렸어요'
      if (msg.includes('user already registered') || msg.includes('already been registered')) return '이미 가입된 이메일이에요'
      if (msg.includes('password should be at least') || msg.includes('password')) return '비밀번호는 8자 이상이어야 해요'
      if (msg.includes('network') || msg.includes('fetch')) return '잠시 후 다시 시도해주세요'
      return err.message || '잠시 후 다시 시도해주세요'
    }

    /* ── 탭 전환 ── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active')
      })
    })

    /* ─────────────────────────────────────
       1. 로그인
    ───────────────────────────────────── */
    async function doLogin() {
      const email    = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-pw').value

      if (!email || !password) { showToast('이메일과 비밀번호를 입력해주세요', 'error'); return }

      const btn = document.getElementById('btn-login')
      btn.disabled = true
      btn.textContent = '로그인 중...'
      trackEvent('login_click', { method: 'email' })

      const { error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        showToast(toKoreanError(error), 'error')
        btn.disabled = false
        btn.textContent = '로그인'
      } else {
        showToast('로그인 성공! 이동합니다...', 'success')
        setTimeout(() => { window.location.href = 'mypage.html' }, 800)
      }
    }

    document.getElementById('btn-login').addEventListener('click', doLogin)
    document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
    document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pw').focus() })

    /* ─────────────────────────────────────
       2. 회원가입
    ───────────────────────────────────── */
    async function doSignup() {
      const email      = document.getElementById('signup-email').value.trim()
      const password   = document.getElementById('signup-pw').value
      const password2  = document.getElementById('signup-pw2').value
      const store_name = document.getElementById('signup-store').value.trim()

      if (!email || !password) { showToast('이메일과 비밀번호를 입력해주세요', 'error'); return }
      if (password.length < 8)  { showToast('비밀번호는 8자 이상이어야 해요', 'error'); return }
      if (password !== password2) { showToast('비밀번호가 일치하지 않아요', 'error'); return }

      const btn = document.getElementById('btn-signup')
      btn.disabled = true
      btn.textContent = '가입 중...'
      trackEvent('signup_click', { method: 'email' })

      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { store_name: store_name || null } }
      })

      if (error) {
        showToast(toKoreanError(error), 'error')
        btn.disabled = false
        btn.textContent = '가입하기'
      } else {
        showToast('확인 이메일을 발송했어요. 메일함을 확인해주세요!', 'success')
        btn.disabled = false
        btn.textContent = '가입하기'
      }
    }

    document.getElementById('btn-signup').addEventListener('click', doSignup)
    ;['signup-email', 'signup-pw', 'signup-pw2', 'signup-store'].forEach((id, i, arr) => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          if (i < arr.length - 1) document.getElementById(arr[i + 1]).focus()
          else doSignup()
        }
      })
    })

    /* ─────────────────────────────────────
       3. 비밀번호 찾기
    ───────────────────────────────────── */
    document.getElementById('btn-forgot').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim()
      if (!email) { showToast('이메일을 먼저 입력해주세요', 'error'); return }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${location.origin}/reset-password.html`
      })

      if (error) {
        showToast(toKoreanError(error), 'error')
      } else {
        showToast('비밀번호 재설정 링크를 이메일로 보냈어요', 'success')
      }
    })

    /* ─────────────────────────────────────
       4. 카카오 (준비 중)
    ───────────────────────────────────── */
    function kakaoNotReady() {
      showToast('카카오 연동 준비 중이에요 🙏')
    }
    document.getElementById('btn-kakao-login').addEventListener('click', kakaoNotReady)
    document.getElementById('btn-kakao-signup').addEventListener('click', kakaoNotReady)
  </script>
</body>
</html>
